name: S.Budget CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: sbudget
          POSTGRES_PASSWORD: sbudget_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sbudget"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      rabbitmq:
        image: rabbitmq:3-management-alpine
        env:
          RABBITMQ_DEFAULT_USER: sbudget
          RABBITMQ_DEFAULT_PASS: sbudget_pass
        ports:
          - 5672:5672
        options: >-
          --health-cmd "rabbitmq-diagnostics check_running"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm run test
        env:
          AUTH_DATABASE_URL: postgresql://sbudget:sbudget_pass@localhost:5432/auth_db
          TRANSACTION_DATABASE_URL: postgresql://sbudget:sbudget_pass@localhost:5432/transaction_db
          INSIGHT_DATABASE_URL: postgresql://sbudget:sbudget_pass@localhost:5432/insight_db
          RABBITMQ_URL: amqp://sbudget:sbudget_pass@localhost:5672
          JWT_SECRET: test-secret

  build:
    name: Build
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    strategy:
      matrix:
        service:
          - api-gateway
          - auth-service
          - transaction-service
          - ai-service
          - insight-service

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build ${{ matrix.service }}
        run: npx nest build ${{ matrix.service }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/sbudget-${{ matrix.service }}:latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/sbudget-${{ matrix.service }}:${{ github.sha }}
